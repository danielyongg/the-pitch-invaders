name: Sync Club Friendlies fixtures

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-fixtures for Club Friendlies
        run: curl -sf "https://the-pitch-invaders.vercel.app/api/sync-fixtures?league=100"
